{% extends 'base.html' %}
{% block title %}Criar Novo Evento - XI DIA DO LEITE{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-12 flex justify-center">
    <div class="w-full max-w-3xl bg-white rounded-[2rem] shadow-xl p-8 md:p-12 border border-gray-100">

        <div class="flex items-center gap-4 mb-8 border-b border-gray-100 pb-6">
            <div
                class="w-12 h-12 bg-red-50 text-gebov rounded-xl flex items-center justify-center text-2xl shadow-inner">
                📝
            </div>
            <div>
                <h2 class="text-3xl font-black text-slate-800 uppercase italic tracking-tighter">Novo Evento</h2>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-1">Painel da Organização</p>
            </div>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Título do
                        Evento</label>
                    <input type="text" name="titulo" required placeholder="Ex: Palestra Magna sobre Genética"
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-gebov outline-none text-slate-700">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Tipo de Evento</label>
                    <select name="tipo" required
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-gebov outline-none text-slate-700 appearance-none">
                        <option value="" disabled selected>Selecione...</option>
                        {% for tipo in tipos %}
                        <option value="{{ tipo.id }}">{{ tipo.nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Carga Horária
                        (Horas)</label>
                    <input type="number" name="carga_horaria" required min="1" placeholder="Ex: 4"
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-gebov outline-none text-slate-700">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Data</label>
                    <input type="date" name="data_evento" required
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-gebov outline-none text-slate-700">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Horário</label>
                    <input type="time" name="horario_evento" required
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-gebov outline-none text-slate-700">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Local</label>
                    <input type="text" name="local" required placeholder="Ex: Auditório Principal"
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-gebov outline-none text-slate-700">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Valor da Inscrição
                        (R$)</label>
                    <input type="number" name="preco" step="0.01" min="0" placeholder="0.00 (Deixe 0 para Grátis)"
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-gebov outline-none text-slate-700">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Descrição</label>
                <textarea name="descricao" required rows="4"
                    placeholder="Escreva os detalhes sobre o que vai ser ensinado no evento..."
                    class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-gebov outline-none text-slate-700 resize-none"></textarea>
            </div>

            <div class="pt-4 flex flex-col md:flex-row gap-4">
                <a href="{% url 'landing_page' %}"
                    class="w-full md:w-1/3 py-5 bg-gray-100 text-gray-500 font-black rounded-2xl uppercase text-xs tracking-widest text-center hover:bg-gray-200 transition">Cancelar</a>
                <button type="submit"
                    class="w-full md:w-2/3 py-5 bg-gebov text-white font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl hover:bg-red-900 transition">Publicar
                    Evento</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
